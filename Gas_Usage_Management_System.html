<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gas Usage Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!--This is for the PDF Document-->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script> 

  <link rel="stylesheet" href="Gas_Usage_Management_System.css">
</head>

<body>

<div class="shell">

  <header class="top-bar">
    <div class="brand">
      <span class="brand-name">GasTrack</span>
    </div>
    <div class="header-actions">
      <button class="btn-ghost" onclick="exportPDF()">↓ Export PDF</button>
      <button class="btn-danger" onclick="resetSystem()">Reset</button>
    </div>
  </header>

  <!-- STAT CARDS -->
  <div class="stat-row">
    <div class="stat-card">
      <p class="stat-label">Total Usage</p>
      <p class="stat-value" id="totalUsage">0 <span class="stat-unit">units</span></p>
    </div>
    <div class="stat-card">
      <p class="stat-label">Active Rooms</p>
      <p class="stat-value" id="activeRooms">0</p>
    </div>
    <div class="stat-card">
      <p class="stat-label">System Status</p>
      <p class="stat-value status-live">Live</p>
    </div>
  </div>

  <div class="main-grid">

    <!-- LEFT: INPUT + ALERT-->
    <div class="left-col">

      <div class="panel">
        <p class="panel-title">Log Usage</p>
        <div class="form-stack">
          <div class="input-group">
            <label>Room</label>
            <input type="text" id="roomInput" placeholder="e.g. Room 101">
          </div>
          <div class="input-group">
            <label>Usage (units)</label>
            <input type="number" id="usageInput" placeholder="e.g. 450" min="0">
          </div>
          <div class="input-group">
            <label>Date</label>
            <input type="date" id="dateInput">
          </div>
          <button class="btn-primary" onclick="addUsage()">+ Add Entry</button>
        </div>
      </div>

      <div class="panel" id="alertPanel">
        <p class="panel-title">Alerts</p>
        <div id="alerts"><p class="empty-msg">No alerts — all rooms normal.</p></div>
      </div>

    </div>

    <!-- RIGHT: TABLE -->
    <div class="right-col">
      <div class="panel full-height">
        <p class="panel-title">Room Summary</p>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Room</th>
                <th>Total Usage</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="roomTable">
              <tr><td colspan="3" class="empty-msg">No data yet. Add usage to get started.</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="Gas_Usage_Management_System.js"></script>
</body>
</html>
