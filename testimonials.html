<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testimonials</title>
    <link rel="stylesheet" href="testimonials.css">
</head>

<body>

    <h2>Submit a Testimonial</h2>

    <form id="testimonialForm">
        <input type="text" id="username" placeholder="Your Name" required><br><br>
        <textarea id="comment" placeholder="Your comment about the system" required></textarea><br><br>
        <button type="submit">Submit Testimonial</button>
    </form>

    <h3>Your Testimonials</h3>

    <!-- Container for displaying testimonials as cards -->
    <div id="userTestimonials">
        <!-- Testimonials will appear here as cards -->
    </div>

    <script src="testimnials.js"></script>
</body>

</html>
