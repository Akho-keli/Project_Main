<!DOCTYPE html>
<html lang="en">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin Register</title>
    <link rel="stylesheet" href="Admin_Register.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    

    
</head>
<body>
    
    <div class="container">
        <div class="curved-shape"></div>
        <div class="curved-shape_2"></div>
        <div class="form-box Login">
            <h2 class="animation">Super Admin Register</h2>

              <!--This is the registration form for super admins -->
            <form  action="" method="post" id="register_form">
                <div class="input">
                    <input type="text" required id="username">
                    <label for="">Username</label>
                    <ion-icon name="person"></ion-icon>
                </div>

                <div class="input">
                    <input type="email" required id="email">
                    <label for="email">Email</label>
                    <ion-icon name="mail-unread"></ion-icon>
                </div>

                <div class="input">
                    <input type="text" required id="code">
                    <label for=""> Admin Code </label>
                    <ion-icon name="qr-code"></ion-icon>
                    
                </div>


                <div class="input">
                    <input type="password" required id="password">
                    <label for="">Password</label>
                    <ion-icon class="icon" name="lock-closed"></ion-icon>
                    
                </div>
                <div class="input">
                    <input type="password" required id="confirm_password">
                    <label for="password">Confirm password</label>
                    <ion-icon name="lock-open"></ion-icon>
                </div>
                <div class="input">
                    <button class="bnt" type="submit">Register</button>
                </div>
                <div class="regi-link">
                    <p>Already have an account? <a href="Admin_Login.html" >Login</a></p>
                </div>
            </form>      
        </div>
    
    <script src="Registration_Admin.js"></script>
    <!--The ionicons script-->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>
</html>
